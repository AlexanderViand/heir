# SkyPilot config for running ONLY the MNIST MLP end-to-end test on the CHEDDAR
# GPU backend -- faster to iterate on than sky/cheddar_test_dbg.yaml, which runs
# all of //tests/Examples/cheddar/...
#
# This is the test that lowers HEIR's MNIST MLP through
# scheme-to-cheddar -> cheddar-to-emitc -> mlir-to-cpp and runs it on the GPU.
#
# Usage (reuses the default/debug instance + its warm bazel cache):
#   sky launch -c heir-cheddar-dbg -i 120 sky/cheddar_mnist.yaml
#
# Uses the nvidia/cuda Ubuntu 24.04 base image for clang-18 + CUDA compatibility.

name: heir-cheddar-dbg

# assumes we'll call this from the repo root
workdir: .

resources:
  accelerators: A10G:1
  cpus: 64+
  memory: 128+
  disk_size: 200
  cloud: aws
  image_id: docker:nvidia/cuda:12.9.1-cudnn-devel-ubuntu24.04
  autostop:
    idle_minutes: 120

setup: |
  set -ex

  apt-get update -qq
  apt-get install -y -qq \
    clang lld libomp-dev llvm \
    zlib1g-dev \
    libtommath-dev libjsoncpp-dev \
    libcusparselt0 \
    git wget pip

  if ! command -v bazel &> /dev/null; then
    wget -q https://github.com/bazelbuild/bazelisk/releases/latest/download/bazelisk-linux-amd64 -O /usr/local/bin/bazel
    chmod +x /usr/local/bin/bazel
  fi

# Fetch first (avoids random python-wheel-extraction timeouts mid-build).
run: |
  set -e
  bazel fetch //tests/Examples/cheddar/mnist/... --//:enable_cheddar=1
  CC=clang bazel test \
    //tests/Examples/cheddar/mnist:mnist_test \
    --//:enable_cheddar=1 --test_output=streamed --test_timeout=1800
