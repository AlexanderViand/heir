# SkyPilot config for running CHEDDAR backend tests on a GPU instance.
# Usage: sky launch sky/cheddar_test.yaml
#
# Uses nvidia/cuda Ubuntu 24.04 base image for clang-18 + CUDA compatibility.

name: heir-cheddar

resources:
  accelerators: A10G:1
  cpus: 64+
  memory: 128+
  disk_size: 200
  cloud: aws
  image_id: docker:nvidia/cuda:12.6.3-devel-ubuntu24.04

setup: |
  set -ex

  # System deps
  apt-get update -qq
  apt-get install -y -qq \
    clang lld libomp-dev \
    zlib1g-dev \
    libtommath-dev libjsoncpp-dev \
    git wget pip

  # Newer cmake (CHEDDAR requires >= 3.24)
  pip install cmake --upgrade -q --break-system-packages

  # Bazelisk
  if ! command -v bazel &> /dev/null; then
    wget -q https://github.com/bazelbuild/bazelisk/releases/latest/download/bazelisk-linux-amd64 -O /usr/local/bin/bazel
    chmod +x /usr/local/bin/bazel
  fi

  # Clone CHEDDAR
  if [ ! -d /tmp/cheddar-fhe ]; then
    git clone https://github.com/scale-snu/cheddar-fhe.git /tmp/cheddar-fhe
  fi

  # Build CHEDDAR
  cd /tmp/cheddar-fhe
  rm -rf build && mkdir build && cd build
  NCPU=$(cat /proc/cpuinfo | grep processor | wc -l)
  cmake .. -DCMAKE_BUILD_TYPE=Release -DBUILD_UNITTEST=ON -DENABLE_EXTENSION=ON -DUSE_GMP=OFF
  make -j$NCPU

  # Clone HEIR (cheddar branch)
  if [ ! -d ~/heir ]; then
    git clone https://github.com/AlexanderViand/heir.git ~/heir
  fi
  cd ~/heir
  git fetch origin
  git checkout -B worktree-cheddar-backend origin/worktree-cheddar-backend

  # Build HEIR tools
  CC=clang bazel build //tools:heir-opt //tools:heir-translate

run: |
  set -ex
  export LD_LIBRARY_PATH=/tmp/cheddar-fhe/build:$LD_LIBRARY_PATH
  cd ~/heir

  # HEIR dialect roundtrip
  bazel run //tools:heir-opt -- $(pwd)/tests/Dialect/Cheddar/IR/roundtrip.mlir

  # HEIR fusion pass
  bazel run //tools:heir-opt -- --cheddar-fuse-ops $(pwd)/tests/Dialect/Cheddar/Transforms/fuse_ops.mlir

  # Full MLP pipeline: lower + fuse + emit C++
  bazel run //tools:heir-opt -- --lwe-to-cheddar --cheddar-fuse-ops \
    $(pwd)/tests/Examples/orion/mlp/mlp.mlir | \
    bazel run //tools:heir-translate -- --emit-cheddar --allow-unregistered-dialect

  # CHEDDAR GPU test
  cd /tmp/cheddar-fhe/build/unittest
  ./basic_test --gtest_filter="Cheddar/Testbed32.CtAddCt/bootparam_30_json"

  echo "All CHEDDAR tests passed!"
