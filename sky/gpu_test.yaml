# Run from repo root with:
#   sky launch -c heir-gpu-test sky/gpu_test.yaml
# Rerun this YAML on an existing cluster with:
#   sky exec --workdir . heir-gpu-test sky/gpu_test.yaml

name: heir-gpu-test

resources:
  image_id: docker:nvidia/cuda:12.9.1-cudnn-devel-ubuntu24.04
  accelerators: L4

workdir: .

setup: |
  set -euo pipefail

  if ! command -v bazel >/dev/null 2>&1; then
    curl -fsSL https://github.com/bazelbuild/bazelisk/releases/latest/download/bazelisk-linux-amd64 \
      -o /tmp/bazel
    sudo install -m 0755 /tmp/bazel /usr/local/bin/bazel
  fi

  sudo apt-get update
  sudo apt-get install -y git clang lld gcc g++ cmake ninja-build libomp-dev

  bazel build //tools:heir-opt //tools:heir-translate @llvm-project//llvm:llc

run: |
  set -euo pipefail

  echo '== Build tools =='
  bazel build //tools:heir-opt //tools:heir-translate @llvm-project//llvm:llc

  echo '== Lower and run GPU kernel =='
  ./scripts/build_gpu_kernel.sh
